apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: nexus
data:
  config.json: |
    {
      "api": {
        "oauth": {
          "base_url": "https://api.apashinov.com"
        }
      },
      "redis": {
        "url": "redis://redis:6379"
      },
      "kafka": {
        "brokers": "kafka:9092"
      }
    }
